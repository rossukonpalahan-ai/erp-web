<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ERP Mini</title>
<style>
body { font-family: Arial; padding:20px; background:#f5f5f5;}
input, select { padding:6px; margin:5px;}
table { border-collapse: collapse; margin-top:10px; width:100%;}
td, th { border:1px solid #ccc; padding:6px;}
button { padding:8px 12px; margin-top:10px; cursor:pointer;}
.container { background:#fff; padding:20px; border-radius:10px; max-width:800px;}
</style>
</head>

<body>

<div class="container">
<h2>📄 ERP Mini (QT / PR / PO)</h2>

<label>ประเภทเอกสาร:</label>
<select id="type">
  <option value="qt">Quotation (QT)</option>
  <option value="pr">Purchase Request (PR)</option>
  <option value="po">Purchase Order (PO)</option>
</select>

<br>

<label>เลขที่:</label>
<input type="text" id="no">

<label>วันที่:</label>
<input type="date" id="date">

<hr>

<h3>เพิ่มรายการ</h3>

<input type="text" id="item" placeholder="ชื่อรายการ">
<input type="number" id="qty" placeholder="จำนวน">
<input type="number" id="price" placeholder="ราคา">

<button onclick="addItem()">➕ เพิ่ม</button>

<table id="table">
<tr>
<th>รายการ</th>
<th>จำนวน</th>
<th>ราคา</th>
<th>รวม</th>
</tr>
</table>

<h3 id="total">รวม: 0</h3>

<button onclick="save()">💾 บันทึก</button>

</div>

<script>

let items = [];
let total = 0;

// 🔥 เพิ่มรายการ
function addItem() {
  let item = document.getElementById("item").value;
  let qty = parseFloat(document.getElementById("qty").value);
  let price = parseFloat(document.getElementById("price").value);

  if (!item || !qty || !price) {
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  let sum = qty * price;
  total += sum;

  items.push({ item, qty, price, sum });

  let table = document.getElementById("table");
  let row = table.insertRow();

  row.insertCell(0).innerText = item;
  row.insertCell(1).innerText = qty;
  row.insertCell(2).innerText = price;
  row.insertCell(3).innerText = sum;

  document.getElementById("total").innerText = "รวม: " + total;

  document.getElementById("item").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("price").value = "";
}

// 🔥 บันทึกลง Google Sheet
function save() {

  const data = {
    type: document.getElementById("type").value,
    no: document.getElementById("no").value,
    date: document.getElementById("date").value,
    items: items,
    grand: total
  };

  console.log("Sending:", data);

  fetch("https://script.google.com/macros/s/AKfycby7rWjQ8bmFwWNvX9MfY0J1PnayXod_CIyW7dsNZGrLgj7TR7P94LAVAg_g5bn07XprQQ/exec", {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    console.log(res);
    alert("✅ บันทึกสำเร็จ");

    // reset
    items = [];
    total = 0;
    document.getElementById("table").innerHTML = `
      <tr>
        <th>รายการ</th>
        <th>จำนวน</th>
        <th>ราคา</th>
        <th>รวม</th>
      </tr>
    `;
    document.getElementById("total").innerText = "รวม: 0";

  })
  .catch(err => {
    console.error(err);
    alert("❌ error");
  });

}

</script>

</body>
</html>
